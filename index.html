<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MenuMaster - مطعم البيتزا</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --main-red: #c0392b; --accent: #f39c12; --border-color: #7f8c8d; --green: #27ae60; --blue: #2980b9; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: #f8f9fa; }
    /* شريط المسؤول */
    .admin-bar { background: #2c3e50; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .admin-login-btn { background: var(--main-red); color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; }
    /* المودالات */
    .modal, .login-prompt, .delivery-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1001; justify-content: center; align-items: center; }
    .modal.active, .login-prompt.active, .delivery-modal.active { display: flex; }
    .modal-content { background: white; width: 95%; max-width: 900px; max-height: 90vh; overflow-y: auto; border-radius: 25px; padding: 20px; }
    .delivery-content { background: white; width: 90%; max-width: 500px; border-radius: 25px; padding: 25px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
    .close-modal { background: none; border: none; font-size: 24px; cursor: pointer; }
    .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .admin-tab { padding: 8px 16px; background: #ecf0f1; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .admin-tab.active { background: var(--main-red); color: white; }
    .admin-section { display: none; }
    .admin-section.active { display: block; }
    .products-table { width: 100%; border-collapse: collapse; }
    .products-table th, .products-table td { padding: 8px; text-align: center; border-bottom: 1px solid #ecf0f1; }
    .products-table th { background: var(--main-red); color: white; }
    .action-btn { padding: 4px 8px; border: none; border-radius: 5px; cursor: pointer; margin: 2px; }
    .edit-btn { background: var(--blue); color: white; }
    .delete-btn { background: var(--main-red); color: white; }
    .add-btn { background: var(--green); color: white; padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; margin-bottom: 15px; }
    .product-form { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; display: none; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 5px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 2px solid var(--border-color); border-radius: 8px; font-family: 'Cairo'; }
    .image-upload-section { border: 2px dashed var(--border-color); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 15px; background: white; }
    .image-preview { width: 100px; height: 100px; margin: 0 auto 10px; border-radius: 15px; overflow: hidden; display: none; border: 2px solid var(--main-red); }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; }
    .image-upload-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .camera-btn, .gallery-btn, .url-btn { padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
    .camera-btn { background: var(--main-red); color: white; }
    .gallery-btn { background: var(--blue); color: white; }
    .url-btn { background: #7f8c8d; color: white; }
    .image-url-input { display: none; margin-top: 10px; }
    .image-url-input.active { display: block; }
    /* تصميم الواجهة الرئيسية */
    .restaurant-header { height: 200px; position: relative; background: linear-gradient(135deg, var(--main-red), #e74c3c); border-radius: 0 0 35px 35px; overflow: hidden; }
    .header-pattern { position: absolute; width: 100%; height: 100%; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M20 20 L30 15 L40 20 L50 10 L60 20 L70 10 L80 20 L90 10 L80 30 L90 40 L80 50 L90 60 L80 70 L90 80 L70 70 L60 80 L50 70 L40 80 L30 70 L20 80 L10 70 L20 60 L10 50 L20 40 L10 30 L20 20" fill="none" stroke="white" stroke-width="2"/></svg>'); background-size: 50px; }
    .restaurant-info { position: absolute; bottom: 20px; right: 20px; color: white; z-index: 2; }
    .restaurant-name { font-size: 26px; font-weight: 900; color: var(--accent); margin: 0; }
    .rating { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
    .stars { color: var(--accent); }
    .tabs-container { background: white; margin: 15px; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .tabs { display: flex; background: #f1f2f6; }
    .tab { flex: 1; text-align: center; padding: 12px; font-weight: 700; cursor: pointer; }
    .tab.active { background: white; color: var(--main-red); border-bottom: 3px solid var(--main-red); }
    .tab-content { padding: 15px; display: none; }
    .tab-content.active { display: block; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    .menu-item { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
    .menu-item.selected { border-color: var(--main-red); transform: scale(1.02); }
    .item-image { width: 100%; height: 130px; background-size: cover; background-position: center; position: relative; }
    .item-price { position: absolute; top: 8px; left: 8px; background: var(--main-red); color: white; padding: 3px 8px; border-radius: 20px; font-weight: 700; font-size: 13px; }
    .item-info { padding: 10px; }
    .item-name { font-weight: 800; margin-bottom: 4px; }
    .item-desc { font-size: 11px; color: #7f8c8d; margin-bottom: 8px; }
    .add-btn { width: 100%; background: var(--main-red); color: white; border: none; padding: 6px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .cart-side { background: white; border-radius: 20px; padding: 15px; }
    .cart-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .cart-items { max-height: 200px; overflow-y: auto; margin-bottom: 15px; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #ecf0f1; }
    .item-quantity { display: flex; align-items: center; gap: 8px; }
    .qty-btn { background: #ecf0f1; border: none; width: 26px; height: 26px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    .cart-total { border-top: 2px solid #ecf0f1; padding-top: 10px; }
    .total-row { display: flex; justify-content: space-between; margin: 5px 0; }
    .total-row.final { font-weight: 800; color: var(--main-red); margin-top: 8px; }
    .free-delivery { color: var(--green); font-size: 13px; margin-top: 5px; display: none; }
    .checkout-btn { width: 100%; background: var(--main-red); color: white; border: none; padding: 12px; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .field-wrapper { margin-bottom: 15px; }
    .field-label { display: block; font-weight: 700; margin-bottom: 6px; }
    .input-box { width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 12px; font-family: 'Cairo'; }
    .location-container { position: relative; }
    .gps-btn { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: var(--main-red); color: white; border: none; padding: 4px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; }
    .time-row { display: flex; gap: 10px; margin-bottom: 15px; }
    .time-row select { flex: 1; padding: 12px; border: 2px solid var(--border-color); border-radius: 12px; font-family: 'Cairo'; }
    .badge { background: var(--main-red); color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; margin-right: 5px; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 50px; color: white; display: none; z-index: 2000; font-weight: 600; text-align: center; }
    @media (max-width: 600px) { .menu-grid { grid-template-columns: repeat(2, 1fr); } .restaurant-name { font-size: 20px; } }
  </style>
</head>
<body>

<div class="admin-bar">
  <span>🍽️ MenuMaster</span>
  <button class="admin-login-btn" onclick="showAdminLogin()"><i class="fas fa-cog"></i> لوحة التحكم</button>
</div>

<!-- نافذة تسجيل الدخول (كلمة المرور: admin123) -->
<div id="adminLogin" class="login-prompt">
  <div class="login-box" style="background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center;">
    <h3><i class="fas fa-lock"></i> دخول المسؤول</h3>
    <input type="password" id="adminPassword" placeholder="كلمة المرور" style="width:100%; padding:10px; margin:15px 0; border-radius:8px; border:2px solid #ddd;">
    <button onclick="verifyAdmin()" style="background: var(--main-red); color:white; border:none; padding:10px 30px; border-radius:8px;">دخول</button>
  </div>
</div>

<!-- نافذة لوحة التحكم -->
<div id="adminModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2><i class="fas fa-cog"></i> لوحة التحكم</h2>
      <button class="close-modal" onclick="closeAdminModal()">&times;</button>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchAdminTab('products')">📋 المنتجات</button>
      <button class="admin-tab" onclick="switchAdminTab('settings')">⚙️ التوصيل</button>
      <button class="admin-tab" onclick="switchAdminTab('orders')">📦 الطلبات</button>
    </div>
    <!-- قسم المنتجات -->
    <div id="productsSection" class="admin-section active">
      <button class="add-btn" onclick="showAddProductForm()"><i class="fas fa-plus"></i> إضافة منتج</button>
      <div id="productForm" class="product-form">
        <h3 id="formTitle">إضافة منتج</h3>
        <input type="hidden" id="productId">
        <div class="image-upload-section">
          <div class="image-preview" id="imagePreview"><img id="previewImg" src=""></div>
          <div class="image-upload-buttons">
            <button type="button" class="camera-btn" onclick="openCamera()"><i class="fas fa-camera"></i> تصوير</button>
            <button type="button" class="gallery-btn" onclick="openGallery()"><i class="fas fa-images"></i> معرض</button>
            <button type="button" class="url-btn" onclick="toggleUrlInput()"><i class="fas fa-link"></i> رابط</button>
          </div>
          <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none" onchange="handleImageSelect(this)">
          <input type="file" id="galleryInput" accept="image/*" style="display:none" onchange="handleImageSelect(this)">
          <div class="image-url-input" id="urlInput"><input type="text" id="productImage" placeholder="رابط الصورة"></div>
        </div>
        <div class="form-group"><label>الاسم</label><input type="text" id="productName" placeholder="اسم المنتج"></div>
        <div class="form-group"><label>الوصف</label><textarea id="productDescription" rows="2"></textarea></div>
        <div class="form-group"><label>السعر (DH)</label><input type="number" id="productPrice" step="1"></div>
        <div class="form-group"><label>الحالة</label><select id="productAvailable"><option value="نعم">متوفر</option><option value="لا">غير متوفر</option></select></div>
        <button class="add-btn" onclick="saveProduct()" style="width:100%">حفظ</button>
      </div>
      <table class="products-table"><thead><tr><th>الصورة</th><th>الاسم</th><th>السعر</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody id="productsTableBody"></tbody></table>
    </div>
    <!-- قسم إعدادات التوصيل -->
    <div id="settingsSection" class="admin-section">
      <div class="form-group"><label>مبلغ التوصيل (DH)</label><input type="number" id="deliveryFee" value="15"></div>
      <div class="form-group"><label>الحد الأدنى للطلب (DH)</label><input type="number" id="minOrder" value="30"></div>
      <div class="form-group"><label>توصيل مجاني عند (DH)</label><input type="number" id="freeDeliveryThreshold" value="100"></div>
      <div class="form-group"><label>اسم المطعم</label><input type="text" id="restaurantName" value="مطعم البيتزا"></div>
      <div class="form-group"><label>رقم الهاتف (للواتساب)</label><input type="text" id="restaurantPhone" value="212627278070"></div>
      <button class="add-btn" onclick="saveSettings()">حفظ الإعدادات</button>
    </div>
    <!-- قسم الطلبات -->
    <div id="ordersSection" class="admin-section">
      <table class="products-table"><thead><tr><th>رقم الطلب</th><th>العميل</th><th>المجموع</th><th>الحالة</th><th>التاريخ</th></tr></thead><tbody id="ordersTableBody"></tbody></table>
    </div>
  </div>
</div>

<!-- نافذة منبثقة لإدخال معلومات التوصيل (تظهر عند الضغط على إتمام الطلب) -->
<div id="deliveryModal" class="delivery-modal">
  <div class="delivery-content">
    <div class="modal-header">
      <h3 style="color:var(--main-red)"><i class="fas fa-truck"></i> معلومات التوصيل</h3>
      <button class="close-modal" onclick="closeDeliveryModal()">&times;</button>
    </div>
    <form id="deliveryForm">
      <div class="field-wrapper"><label class="field-label"><i class="fas fa-user"></i> الاسم الكامل</label><input type="text" id="deliveryName" class="input-box" required></div>
      <div class="field-wrapper"><label class="field-label"><i class="fas fa-phone"></i> رقم الهاتف</label><input type="tel" id="deliveryPhone" class="input-box" required></div>
      <div class="field-wrapper"><div class="location-container"><input type="text" id="deliveryAddress" class="input-box" placeholder="العنوان" required><button type="button" class="gps-btn" onclick="getDeliveryLocation()"><i class="fas fa-crosshairs"></i> حدد</button></div></div>
      <div class="time-row"><select id="deliveryTime" required><option value="">وقت التوصيل</option><option value="أسرع وقت">أسرع وقت</option><option value="12-13">12-13</option><option value="13-14">13-14</option><option value="18-19">18-19</option><option value="19-20">19-20</option></select><select id="paymentMethod" required><option value="">طريقة الدفع</option><option value="نقداً عند الاستلام">نقداً</option><option value="بطاقة بنكية">بطاقة</option></select></div>
      <div class="field-wrapper"><textarea id="deliveryNotes" class="input-box" rows="2" placeholder="ملاحظات إضافية"></textarea></div>
      <button type="submit" class="checkout-btn" style="margin-top:10px;"><i class="fab fa-whatsapp"></i> تأكيد وإرسال الفاتورة</button>
    </form>
  </div>
</div>

<!-- الواجهة الرئيسية -->
<div class="restaurant-header"><div class="header-pattern"></div><div class="restaurant-info"><h1 class="restaurant-name" id="restaurantNameDisplay">🍕 مطعم البيتزا</h1><div class="rating"><div class="stars"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i></div><span>4.5 (800+ تقييم)</span></div></div></div>

<div class="tabs-container"><div class="tabs"><div class="tab active" onclick="switchTab('menu')">📋 القائمة</div><div class="tab" onclick="switchTab('orders')">🛒 طلبي <span id="cartCount" class="badge">0</span></div></div>
  <div id="menuTab" class="tab-content active"><div class="menu-grid" id="menuGrid"></div></div>
  <div id="ordersTab" class="tab-content"><div class="cart-side"><div class="cart-header"><h3><i class="fas fa-shopping-cart"></i> السلة</h3><button onclick="clearCart()" style="background:none; border:none; color:var(--main-red); cursor:pointer;"><i class="fas fa-trash"></i> تفريغ</button></div><div class="cart-items" id="cartItems"></div><div class="cart-total"><div class="total-row"><span>المجموع:</span><span id="subtotal">0 DH</span></div><div class="total-row"><span>التوصيل:</span><span id="deliveryFeeDisplay">0 DH</span></div><div class="total-row final"><span>الإجمالي:</span><span id="totalWithDelivery">0 DH</span></div><div id="freeDeliveryMessage" class="free-delivery"></div></div><button class="checkout-btn" onclick="openDeliveryModal()"><i class="fas fa-check-circle"></i> إتمام الطلب</button></div></div>
</div>

<div id="toast"></div>

<script>
  // --------------------------------------------------------------
  // بيانات التخزين المحلي
  // --------------------------------------------------------------
  let products = JSON.parse(localStorage.getItem('products')) || [
    { id: 'p1', name: 'بيتزا مارجريتا', description: 'صلصة طماطم، موزاريلا، ريحان', price: 39, image: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300', available: 'نعم' },
    { id: 'p2', name: 'بيتزا اللحم المفروم', description: 'لحم مفروم، فلفل، بصل', price: 49, image: 'https://images.unsplash.com/photo-1590947132387-155cc02f3212?w=300', available: 'نعم' },
    { id: 'p3', name: 'بيتزا التونة', description: 'تونة، ذرة، زيتون', price: 49, image: 'https://images.unsplash.com/photo-1594007654729-407eedc4be65?w=300', available: 'نعم' }
  ];
  
  let settings = JSON.parse(localStorage.getItem('settings')) || {
    deliveryFee: 15,
    minOrder: 30,
    freeDeliveryThreshold: 100,
    restaurantName: 'مطعم البيتزا',
    restaurantPhone: '212627278070'
  };
  
  let orders = JSON.parse(localStorage.getItem('orders')) || [];
  let cart = [];
  let isAdmin = false;
  let currentImageData = null;

  function saveProducts() { localStorage.setItem('products', JSON.stringify(products)); }
  function saveSettingsToLocal() { localStorage.setItem('settings', JSON.stringify(settings)); }
  function saveOrders() { localStorage.setItem('orders', JSON.stringify(orders)); }

  // دوال المسؤول
  function showAdminLogin() { document.getElementById('adminLogin').classList.add('active'); }
  function verifyAdmin() {
    let pwd = document.getElementById('adminPassword').value;
    if (pwd === 'admin123') {
      document.getElementById('adminLogin').classList.remove('active');
      isAdmin = true;
      loadAdminData();
      document.getElementById('adminModal').classList.add('active');
    } else { showToast('كلمة المرور غير صحيحة', '#e74c3c'); }
  }
  function closeAdminModal() { document.getElementById('adminModal').classList.remove('active'); resetProductForm(); }
  function switchAdminTab(tab) {
    document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active'));
    if(tab==='products') { document.querySelectorAll('.admin-tab')[0].classList.add('active'); document.getElementById('productsSection').classList.add('active'); loadProductsTable(); }
    else if(tab==='settings') { document.querySelectorAll('.admin-tab')[1].classList.add('active'); document.getElementById('settingsSection').classList.add('active'); loadSettingsForm(); }
    else { document.querySelectorAll('.admin-tab')[2].classList.add('active'); document.getElementById('ordersSection').classList.add('active'); loadOrdersTable(); }
  }
  function loadAdminData() { loadProductsTable(); loadSettingsForm(); loadOrdersTable(); }
  
  function loadProductsTable() {
    let tbody = document.getElementById('productsTableBody');
    tbody.innerHTML = products.map(p => `
      <tr><td><img src="${p.image}" width="50" height="50" style="object-fit:cover; border-radius:8px;"></td>
      <td>${p.name}</td><td>${p.price} DH</td>
      <td style="color:${p.available==='نعم'?'green':'red'}">${p.available}</td>
      <td><button class="action-btn edit-btn" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
      <button class="action-btn delete-btn" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button></td>
     `).join('');
  }
  
  function showAddProductForm() { resetProductForm(); document.getElementById('productForm').style.display = 'block'; document.getElementById('formTitle').innerText = 'إضافة منتج جديد'; }
  function resetProductForm() {
    document.getElementById('productId').value = ''; document.getElementById('productName').value = ''; document.getElementById('productDescription').value = '';
    document.getElementById('productPrice').value = ''; document.getElementById('productImage').value = ''; document.getElementById('productAvailable').value = 'نعم';
    document.getElementById('imagePreview').style.display = 'none'; document.getElementById('previewImg').src = ''; document.getElementById('urlInput').classList.remove('active');
    currentImageData = null;
  }
  function editProduct(id) {
    let p = products.find(x=>x.id===id);
    if(p){
      document.getElementById('productForm').style.display = 'block'; document.getElementById('formTitle').innerText = 'تعديل المنتج';
      document.getElementById('productId').value = p.id; document.getElementById('productName').value = p.name; document.getElementById('productDescription').value = p.description;
      document.getElementById('productPrice').value = p.price; document.getElementById('productAvailable').value = p.available; document.getElementById('productImage').value = p.image;
      if(p.image) { document.getElementById('previewImg').src = p.image; document.getElementById('imagePreview').style.display = 'block'; }
    }
  }
  function deleteProduct(id) { if(confirm('حذف المنتج؟')){ products = products.filter(p=>p.id!==id); saveProducts(); loadProductsTable(); loadMenuForUsers(); showToast('تم الحذف','#27ae60'); } }
  
  function saveProduct() {
    let id = document.getElementById('productId').value;
    let name = document.getElementById('productName').value.trim();
    let desc = document.getElementById('productDescription').value;
    let price = parseInt(document.getElementById('productPrice').value);
    let available = document.getElementById('productAvailable').value;
    let image = document.getElementById('productImage').value || currentImageData || 'https://via.placeholder.com/300?text=No+Image';
    if(!name || !price){ showToast('املأ الاسم والسعر','#e74c3c'); return; }
    if(id){ let index = products.findIndex(p=>p.id===id); if(index!==-1){ products[index] = {...products[index], name, description:desc, price, available, image}; } }
    else { let newId = 'p'+Date.now(); products.push({ id:newId, name, description:desc, price, available, image }); }
    saveProducts(); loadProductsTable(); loadMenuForUsers(); resetProductForm(); document.getElementById('productForm').style.display = 'none';
    showToast('تم الحفظ','#27ae60');
  }
  
  function loadSettingsForm() {
    document.getElementById('deliveryFee').value = settings.deliveryFee;
    document.getElementById('minOrder').value = settings.minOrder;
    document.getElementById('freeDeliveryThreshold').value = settings.freeDeliveryThreshold;
    document.getElementById('restaurantName').value = settings.restaurantName;
    document.getElementById('restaurantPhone').value = settings.restaurantPhone;
    document.getElementById('restaurantNameDisplay').innerText = '🍕 '+settings.restaurantName;
  }
  function saveSettings() {
    settings.deliveryFee = parseFloat(document.getElementById('deliveryFee').value);
    settings.minOrder = parseFloat(document.getElementById('minOrder').value);
    settings.freeDeliveryThreshold = parseFloat(document.getElementById('freeDeliveryThreshold').value);
    settings.restaurantName = document.getElementById('restaurantName').value;
    settings.restaurantPhone = document.getElementById('restaurantPhone').value;
    saveSettingsToLocal();
    document.getElementById('restaurantNameDisplay').innerText = '🍕 '+settings.restaurantName;
    updateCart();
    showToast('تم حفظ الإعدادات','#27ae60');
  }
  
  function loadOrdersTable() {
    let tbody = document.getElementById('ordersTableBody');
    tbody.innerHTML = orders.map(order => `
      <tr><td>${order.orderId}</td><td>${order.customerName}</td><td>${order.total} DH</td>
      <td><select onchange="updateOrderStatus('${order.orderId}', this.value)">${['جديد','قيد التحضير','في الطريق','تم التوصيل','ملغي'].map(s=>`<option ${order.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
      <td>${order.timestamp}</td>
     `).join('');
  }
  function updateOrderStatus(orderId, status) {
    let order = orders.find(o=>o.orderId===orderId);
    if(order) { order.status = status; saveOrders(); loadOrdersTable(); showToast('تم تحديث الحالة','#27ae60'); }
  }
  
  // دوال الصور
  function openCamera() { document.getElementById('cameraInput').click(); }
  function openGallery() { document.getElementById('galleryInput').click(); }
  function toggleUrlInput() { document.getElementById('urlInput').classList.toggle('active'); }
  function handleImageSelect(input) {
    if(input.files && input.files[0]){
      let reader = new FileReader();
      reader.onload = function(e) { currentImageData = e.target.result; document.getElementById('previewImg').src = currentImageData; document.getElementById('imagePreview').style.display = 'block'; document.getElementById('urlInput').classList.remove('active'); document.getElementById('productImage').value = ''; };
      reader.readAsDataURL(input.files[0]);
    }
  }
  
  // دوال الواجهة العامة
  function loadMenuForUsers() {
    let available = products.filter(p=>p.available==='نعم');
    let grid = document.getElementById('menuGrid');
    grid.innerHTML = available.map(item => `
      <div class="menu-item" onclick="selectItem('${item.id}')" id="item-${item.id}">
        <div class="item-image" style="background-image: url('${item.image}')"><span class="item-price">${item.price} DH</span></div>
        <div class="item-info"><div class="item-name">${item.name}</div><div class="item-desc">${item.description}</div>
        <button class="add-btn" onclick="addToCart('${item.id}'); event.stopPropagation();"><i class="fas fa-cart-plus"></i> أضف</button></div>
      </div>
    `).join('');
  }
  
  function addToCart(id) {
    let item = products.find(p=>p.id===id);
    if(item){
      let existing = cart.find(c=>c.id===id);
      if(existing) existing.quantity++;
      else cart.push({...item, quantity:1});
      updateCart();
      showToast('تمت الإضافة', '#27ae60');
      selectItem(id);
      setTimeout(()=>document.getElementById(`item-${id}`)?.classList.remove('selected'),300);
    }
  }
  
  function updateCart() {
    let subtotal = cart.reduce((s,i)=>s + (i.price*i.quantity),0);
    let delivery = (subtotal >= settings.freeDeliveryThreshold) ? 0 : settings.deliveryFee;
    let total = subtotal + delivery;
    let count = cart.reduce((c,i)=>c+i.quantity,0);
    document.getElementById('cartCount').innerText = count;
    document.getElementById('subtotal').innerText = subtotal + ' DH';
    document.getElementById('deliveryFeeDisplay').innerHTML = delivery + ' DH' + (delivery===0?' (مجاني)':'');
    document.getElementById('totalWithDelivery').innerText = total + ' DH';
    let freeMsg = document.getElementById('freeDeliveryMessage');
    if(subtotal >= settings.freeDeliveryThreshold) freeMsg.innerHTML = '<i class="fas fa-gift"></i> توصيل مجاني!'; else freeMsg.innerHTML = '';
    freeMsg.style.display = (subtotal >= settings.freeDeliveryThreshold) ? 'block' : 'none';
    let container = document.getElementById('cartItems');
    if(cart.length===0) container.innerHTML = '<p style="text-align:center">السلة فارغة</p>';
    else {
      container.innerHTML = cart.map(item => `
        <div class="cart-item"><div><div class="cart-item-name">${item.name}</div><div>${item.price} DH</div></div>
        <div class="item-quantity"><button class="qty-btn" onclick="updateQuantity('${item.id}',-1)">-</button><span>${item.quantity}</span><button class="qty-btn" onclick="updateQuantity('${item.id}',1)">+</button></div></div>
      `).join('');
    }
  }
  function updateQuantity(id, delta) {
    let idx = cart.findIndex(c=>c.id===id);
    if(idx!==-1){
      let newQ = cart[idx].quantity + delta;
      if(newQ<=0) cart.splice(idx,1);
      else cart[idx].quantity = newQ;
      updateCart();
    }
  }
  function clearCart() { if(cart.length && confirm('تفريغ السلة؟')){ cart=[]; updateCart(); showToast('تم التفريغ','#e67e22');} }
  function selectItem(id) { document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('selected')); document.getElementById(`item-${id}`)?.classList.add('selected'); }
  function switchTab(tab) {
    document.getElementById('menuTab').classList.toggle('active', tab==='menu');
    document.getElementById('ordersTab').classList.toggle('active', tab==='orders');
    document.querySelectorAll('.tab').forEach((t,i)=>{ if((tab==='menu' && i===0)||(tab==='orders' && i===1)) t.classList.add('active'); else t.classList.remove('active'); });
    if(tab==='orders') updateCart();
  }
  
  // نافذة معلومات التوصيل المنبثقة
  function openDeliveryModal() {
    if(cart.length===0){ showToast('السلة فارغة، أضف أصنافاً أولاً', '#e74c3c'); return; }
    document.getElementById('deliveryModal').classList.add('active');
  }
  function closeDeliveryModal() { document.getElementById('deliveryModal').classList.remove('active'); }
  
  function getDeliveryLocation() {
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos=>{
        document.getElementById('deliveryAddress').value = `موقعي (${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)})`;
        showToast('تم تحديد الموقع','#27ae60');
      },()=>showToast('فشل تحديد الموقع','#e74c3c'));
    } else showToast('المتصفح لا يدعم','#e74c3c');
  }
  
  // إنشاء الفاتورة وإرسال واتساب بعد جمع البيانات
  function generateInvoice(orderData) {
    let itemsText = orderData.items.map(i=>`    ${i.name} × ${i.quantity} = ${i.subtotal} درهم`).join('\n');
    return `🧾 فاتورة الطلب 🧾
    🏪 ${settings.restaurantName}   
    📞 ${settings.restaurantPhone}
    🆔 رقم الطلب: ${orderData.orderId}
    📅 التاريخ: ${orderData.timestamp}
    👤 العميل: ${orderData.customerName}
    📞 الهاتف: ${orderData.phone}
    📍 العنوان: ${orderData.address}
    ---------------------------------
${itemsText}
    ---------------------------------
    💰 المجموع: ${orderData.subtotal} درهم
    🚚 التوصيل: ${orderData.deliveryFee} درهم
    💵 الإجمالي: ${orderData.total} درهم
    شكراً لتسوقكم معنا! 🌟`;
  }
  
  document.getElementById('deliveryForm').onsubmit = function(e){
    e.preventDefault();
    let name = document.getElementById('deliveryName').value.trim();
    let phone = document.getElementById('deliveryPhone').value.trim();
    let address = document.getElementById('deliveryAddress').value.trim();
    let deliveryTime = document.getElementById('deliveryTime').value;
    let paymentMethod = document.getElementById('paymentMethod').value;
    let notes = document.getElementById('deliveryNotes').value;
    if(!name || !phone || !address || !deliveryTime || !paymentMethod){ showToast('املأ جميع الحقول','#e74c3c'); return; }
    
    let subtotal = cart.reduce((s,i)=>s+(i.price*i.quantity),0);
    let deliveryFee = (subtotal >= settings.freeDeliveryThreshold) ? 0 : settings.deliveryFee;
    let total = subtotal + deliveryFee;
    let orderId = 'ORD-' + Date.now().toString(36).toUpperCase() + '-' + Math.floor(Math.random()*1000);
    let orderData = {
      orderId, customerName: name, phone, address, deliveryTime, paymentMethod, notes,
      items: cart.map(i=>({ name:i.name, quantity:i.quantity, subtotal:i.price*i.quantity })),
      subtotal, deliveryFee, total,
      timestamp: new Date().toLocaleString('ar-MA'),
      status: 'جديد'
    };
    let invoice = generateInvoice(orderData);
    let whatsappUrl = `https://wa.me/${settings.restaurantPhone.replace(/[^0-9]/g,'')}?text=${encodeURIComponent(invoice)}`;
    window.open(whatsappUrl, '_blank');
    orders.push(orderData);
    saveOrders();
    cart = [];
    updateCart();
    closeDeliveryModal();
    document.getElementById('deliveryForm').reset();
    showToast('تم إرسال الطلب إلى المطعم عبر واتساب', '#27ae60');
    switchTab('menu');
  };
  
  function showToast(msg, color) {
    let toast = document.getElementById('toast');
    toast.innerText = msg; toast.style.background = color; toast.style.display = 'block';
    setTimeout(()=>toast.style.display='none', 3000);
  }
  
  // التهيئة
  loadSettingsForm();
  loadMenuForUsers();
  updateCart();
  if(orders.length===0) saveOrders();
</script>
</body>
</html>
